<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub — Mensagens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#06090F; --surface:#0D1117; --surface2:#131920;
    --accent:#00E87B; --blue:#4F7CFF; --coral:#FF6B6B;
    --t:#F0F4FF; --t2:#8892A4; --t3:#4A5568;
    --border:rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--t); font-family:'Plus Jakarta Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* TOP BAR */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:56px;
    background:var(--surface); border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .topbar-left { display:flex; align-items:center; gap:16px; }
  .back-btn {
    color:var(--t2); text-decoration:none; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:6px; transition:color .2s;
  }
  .back-btn:hover { color:var(--t); }
  .topbar h1 {
    font-family:'Outfit',sans-serif; font-size:17px; font-weight:700;
  }
  .unread-badge {
    background:var(--accent); color:#030A0E;
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:99px;
    display:none;
  }
  .unread-badge.show { display:inline-block; }

  /* LAYOUT PRINCIPAL */
  .chat-layout {
    display:flex; flex:1; overflow:hidden;
  }

  /* LISTA DE CONVERSAS */
  .conversations-panel {
    width:320px; flex-shrink:0;
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .conv-search {
    padding:16px;
    border-bottom:1px solid var(--border);
  }
  .conv-search input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px; color:var(--t); font-size:14px;
    font-family:'Plus Jakarta Sans',sans-serif; outline:none;
  }
  .conv-search input::placeholder { color:var(--t3); }
  .conv-search input:focus { border-color:var(--blue); }
  .conv-list { flex:1; overflow-y:auto; }
  .conv-item {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; cursor:pointer;
    border-bottom:1px solid var(--border);
    transition:background .15s;
  }
  .conv-item:hover { background:rgba(255,255,255,.03); }
  .conv-item.active { background:rgba(79,124,255,.07); border-right:2px solid var(--blue); }
  .conv-avatar {
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg, var(--surface2), var(--t3));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; color:var(--t);
    position:relative;
  }
  .conv-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .unread-dot {
    position:absolute; top:0; right:0;
    width:10px; height:10px; background:var(--accent);
    border-radius:50%; border:2px solid var(--bg);
    display:none;
  }
  .unread-dot.show { display:block; }
  .conv-info { flex:1; min-width:0; }
  .conv-name {
    font-size:14px; font-weight:600; margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .conv-preview {
    font-size:12px; color:var(--t3);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .conv-preview.unread { color:var(--t2); font-weight:600; }
  .conv-meta { text-align:right; flex-shrink:0; }
  .conv-time { font-size:11px; color:var(--t3); }
  .conv-unread-count {
    display:inline-flex; align-items:center; justify-content:center;
    width:18px; height:18px; border-radius:50%;
    background:var(--accent); color:#030A0E;
    font-size:10px; font-weight:800; margin-top:4px;
  }

  /* PAINEL DE CHAT */
  .chat-panel {
    flex:1; display:flex; flex-direction:column; overflow:hidden;
  }
  .chat-header {
    display:flex; align-items:center; gap:14px;
    padding:16px 24px; border-bottom:1px solid var(--border);
    background:var(--surface); flex-shrink:0;
  }
  .chat-header-avatar {
    width:40px; height:40px; border-radius:50%;
    background:linear-gradient(135deg,#1a2535,#2a3545);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
  }
  .chat-header-info h2 { font-size:15px; font-weight:700; }
  .chat-header-info p { font-size:12px; color:var(--t2); }
  .chat-header-actions { margin-left:auto; display:flex; gap:8px; }
  .icon-btn {
    width:36px; height:36px; border-radius:8px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--t2); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; transition:all .2s;
  }
  .icon-btn:hover { color:var(--t); border-color:var(--t3); }

  /* MENSAGENS */
  .messages-area {
    flex:1; overflow-y:auto; padding:24px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg-group-date {
    text-align:center; font-size:12px; color:var(--t3);
    margin:8px 0; position:relative;
  }
  .msg-group-date::before, .msg-group-date::after {
    content:''; position:absolute; top:50%; width:40%;
    height:1px; background:var(--border);
  }
  .msg-group-date::before { left:0; }
  .msg-group-date::after { right:0; }
  .msg-row {
    display:flex; align-items:flex-end; gap:8px;
  }
  .msg-row.mine { flex-direction:row-reverse; }
  .msg-avatar {
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    background:var(--surface2);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--t2);
  }
  .bubble {
    max-width:65%; padding:10px 14px; border-radius:16px;
    font-size:14px; line-height:1.5;
    position:relative;
  }
  .bubble.them {
    background:var(--surface2); color:var(--t);
    border-bottom-left-radius:4px;
  }
  .bubble.mine {
    background:var(--blue); color:white;
    border-bottom-right-radius:4px;
  }
  .bubble-time {
    font-size:10px; opacity:.6; margin-top:4px; display:block; text-align:right;
  }

  /* INPUT */
  .chat-input-area {
    padding:16px 24px; border-top:1px solid var(--border);
    background:var(--surface); flex-shrink:0;
  }
  .input-row {
    display:flex; gap:10px; align-items:flex-end;
  }
  .msg-input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:12px 16px; color:var(--t); font-size:14px;
    font-family:'Plus Jakarta Sans',sans-serif; resize:none; outline:none;
    max-height:120px; min-height:44px; transition:border-color .2s;
  }
  .msg-input:focus { border-color:var(--blue); }
  .msg-input::placeholder { color:var(--t3); }
  .send-btn {
    width:44px; height:44px; border-radius:12px;
    background:var(--blue); border:none; color:white;
    cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition:all .2s; flex-shrink:0;
  }
  .send-btn:hover { background:#6B92FF; transform:translateY(-1px); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* ESTADO VAZIO */
  .empty-state {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; color:var(--t3);
  }
  .empty-state .icon { font-size:48px; opacity:.4; }
  .empty-state h3 { font-size:18px; color:var(--t2); }
  .empty-state p { font-size:14px; }

  /* LOADING */
  .skeleton {
    background:linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite; border-radius:8px;
  }
  @keyframes shimmer { to { background-position:-200% 0; } }

  @media (max-width:700px) {
    .conversations-panel { width:100%; }
    .chat-panel { display:none; }
    .chat-panel.mobile-open { display:flex; position:fixed; inset:56px 0 0 0; z-index:50; background:var(--bg); }
    .conversations-panel.mobile-hidden { display:none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="#" class="back-btn" id="back-btn" onclick="voltarLista()">← Voltar</a>
    <h1>💬 Mensagens</h1>
  </div>
  <span class="unread-badge" id="total-unread">3</span>
</div>

<div class="chat-layout">

  <!-- LISTA DE CONVERSAS -->
  <div class="conversations-panel" id="conv-panel">
    <div class="conv-search">
      <input type="text" placeholder="🔍  Buscar conversa…" id="search-input" oninput="filtrarConversas()">
    </div>
    <div class="conv-list" id="conv-list">
      <div style="padding:20px;text-align:center;color:var(--t3);font-size:14px;">
        Carregando conversas…
      </div>
    </div>
  </div>

  <!-- PAINEL DE CHAT -->
  <div class="chat-panel" id="chat-panel">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <h3>Selecione uma conversa</h3>
      <p>Escolha uma conversa na lista ao lado para começar.</p>
    </div>

    <div id="chat-content" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chat-header">
        <div class="chat-header-avatar" id="header-avatar">?</div>
        <div class="chat-header-info">
          <h2 id="header-nome">—</h2>
          <p id="header-sub">—</p>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" title="Ver perfil" onclick="verPerfil()">👤</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="chat-input-area">
        <div class="input-row">
          <textarea class="msg-input" id="msg-input" placeholder="Digite uma mensagem…" rows="1"
            onkeydown="inputKeydown(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="enviarMensagem()">➤</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const sb = supabase.createClient(
  'https://xroobxmpmeelklegchhs.supabase.co',
  'sb_publishable_h7ZPYqJFplDqYW9lJ-LURg_kDj5-Zqo'
);

let session = null;
let conversas = [];
let conversaAtiva = null;
let tipoUsuario = null; // 'candidato' | 'empresa'
let realtimeSub = null;

// ─── INIT ────────────────────────────────────────────────
(async () => {
  const { data: { session: s } } = await sb.auth.getSession();
  if (!s) { window.location.href = 'login.html'; return; }
  session = s;

  // Detectar tipo de usuário
  const { data: emp } = await sb.from('empresas').select('id').eq('user_id', s.user.id).maybeSingle();
  tipoUsuario = emp ? 'empresa' : 'candidato';

  await carregarConversas();
  assinarRealtime();
})();

// ─── CARREGAR CONVERSAS ──────────────────────────────────
async function carregarConversas() {
  const uid = session.user.id;

  // Buscar últimas mensagens agrupadas por conversa
  const { data: msgs, error } = await sb
    .from('mensagens')
    .select(`
      id, conversa_id, texto, created_at, lida,
      remetente_id, destinatario_id
    `)
    .or(`remetente_id.eq.${uid},destinatario_id.eq.${uid}`)
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }

  // Agrupar por conversa_id (pegar a mais recente de cada)
  const mapaConversas = new Map();
  for (const m of msgs) {
    if (!mapaConversas.has(m.conversa_id)) {
      mapaConversas.set(m.conversa_id, m);
    }
  }

  // Para cada conversa, buscar dados do outro participante
  const lista = [];
  for (const [convId, ultima] of mapaConversas) {
    const outroId = ultima.remetente_id === uid ? ultima.destinatario_id : ultima.remetente_id;

    // Contar não lidas nessa conversa
    const { count } = await sb
      .from('mensagens')
      .select('id', { count: 'exact', head: true })
      .eq('conversa_id', convId)
      .eq('destinatario_id', uid)
      .eq('lida', false);

    // Buscar nome do outro usuário
    let nome = 'Usuário';
    let sub = '';
    const { data: cand } = await sb.from('candidatos').select('nome, titulo').eq('user_id', outroId).maybeSingle();
    if (cand) { nome = cand.nome || 'Candidato'; sub = cand.titulo || ''; }
    else {
      const { data: emp } = await sb.from('empresas').select('nome_fantasia, cidade').eq('user_id', outroId).maybeSingle();
      if (emp) { nome = emp.nome_fantasia || 'Empresa'; sub = emp.cidade || ''; }
    }

    lista.push({
      conversa_id: convId,
      outro_id: outroId,
      nome, sub,
      ultima_msg: ultima.texto,
      ultima_at: ultima.created_at,
      nao_lidas: count || 0,
      eh_minha: ultima.remetente_id === uid,
    });
  }

  conversas = lista;
  renderConversas(lista);
  atualizarTotalUnread();
}

function renderConversas(lista) {
  const el = document.getElementById('conv-list');
  if (lista.length === 0) {
    el.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--t3);font-size:14px;">
      Nenhuma conversa ainda.<br>Inicie uma pelo perfil da vaga.</div>`;
    return;
  }
  el.innerHTML = lista.map(c => `
    <div class="conv-item${conversaAtiva?.conversa_id === c.conversa_id ? ' active' : ''}"
         onclick="abrirConversa('${c.conversa_id}')">
      <div class="conv-avatar">
        ${c.nome.charAt(0).toUpperCase()}
        <div class="unread-dot ${c.nao_lidas > 0 ? 'show' : ''}"></div>
      </div>
      <div class="conv-info">
        <div class="conv-name">${c.nome}</div>
        <div class="conv-preview ${c.nao_lidas > 0 ? 'unread' : ''}">
          ${c.eh_minha ? 'Você: ' : ''}${c.ultima_msg}
        </div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${formatarHora(c.ultima_at)}</div>
        ${c.nao_lidas > 0 ? `<div class="conv-unread-count">${c.nao_lidas}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function filtrarConversas() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtradas = q ? conversas.filter(c => c.nome.toLowerCase().includes(q)) : conversas;
  renderConversas(filtradas);
}

// ─── ABRIR CONVERSA ──────────────────────────────────────
async function abrirConversa(conversaId) {
  conversaAtiva = conversas.find(c => c.conversa_id === conversaId);
  if (!conversaAtiva) return;

  // UI
  document.getElementById('empty-state').style.display = 'none';
  const cc = document.getElementById('chat-content');
  cc.style.display = 'flex';
  cc.style.flexDirection = 'column';
  cc.style.overflow = 'hidden';
  cc.style.flex = '1';

  document.getElementById('header-nome').textContent = conversaAtiva.nome;
  document.getElementById('header-sub').textContent = conversaAtiva.sub;
  document.getElementById('header-avatar').textContent = conversaAtiva.nome.charAt(0).toUpperCase();

  renderConversas(conversas); // re-render para marcar ativo

  await carregarMensagens(conversaId);
  await marcarComoLidas(conversaId);
}

async function carregarMensagens(conversaId) {
  const area = document.getElementById('messages-area');
  area.innerHTML = '<div style="text-align:center;color:var(--t3);font-size:13px;padding:20px;">Carregando…</div>';

  const { data: msgs, error } = await sb
    .from('mensagens')
    .select('*')
    .eq('conversa_id', conversaId)
    .order('created_at', { ascending: true });

  if (error) { console.error(error); return; }
  renderMensagens(msgs);
}

function renderMensagens(msgs) {
  const area = document.getElementById('messages-area');
  const uid  = session.user.id;

  if (msgs.length === 0) {
    area.innerHTML = '<div style="text-align:center;color:var(--t3);font-size:13px;padding:40px;">Sem mensagens ainda. Diga olá!</div>';
    return;
  }

  let html = '';
  let ultimaData = '';
  for (const m of msgs) {
    const data = new Date(m.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
    if (data !== ultimaData) {
      html += `<div class="msg-group-date">${data}</div>`;
      ultimaData = data;
    }
    const mine = m.remetente_id === uid;
    const ini  = mine ? 'V' : (conversaAtiva?.nome?.charAt(0) || '?');
    html += `
      <div class="msg-row${mine ? ' mine' : ''}">
        ${!mine ? `<div class="msg-avatar">${ini}</div>` : ''}
        <div class="bubble ${mine ? 'mine' : 'them'}">
          ${escapeHtml(m.texto)}
          <span class="bubble-time">${formatarHora(m.created_at)}${mine ? (m.lida ? ' ✓✓' : ' ✓') : ''}</span>
        </div>
      </div>`;
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

async function marcarComoLidas(conversaId) {
  await sb
    .from('mensagens')
    .update({ lida: true })
    .eq('conversa_id', conversaId)
    .eq('destinatario_id', session.user.id)
    .eq('lida', false);

  // Atualizar contadores
  const c = conversas.find(x => x.conversa_id === conversaId);
  if (c) c.nao_lidas = 0;
  atualizarTotalUnread();
  renderConversas(conversas);
}

// ─── ENVIAR MENSAGEM ─────────────────────────────────────
async function enviarMensagem() {
  const input = document.getElementById('msg-input');
  const texto = input.value.trim();
  if (!texto || !conversaAtiva) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  autoResize(input);

  const { error } = await sb.from('mensagens').insert({
    conversa_id:     conversaAtiva.conversa_id,
    remetente_id:    session.user.id,
    destinatario_id: conversaAtiva.outro_id,
    texto,
  });

  if (error) {
    toast('Erro ao enviar mensagem', 'error');
    input.value = texto;
  } else {
    await carregarMensagens(conversaAtiva.conversa_id);
    await carregarConversas();
  }
  btn.disabled = false;
  input.focus();
}

// ─── REALTIME ────────────────────────────────────────────
function assinarRealtime() {
  const uid = session.user.id;
  realtimeSub = sb
    .channel('mensagens-realtime')
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'mensagens',
      filter: `destinatario_id=eq.${uid}`
    }, async (payload) => {
      // Nova mensagem chegou
      await carregarConversas();
      if (conversaAtiva && payload.new.conversa_id === conversaAtiva.conversa_id) {
        await carregarMensagens(conversaAtiva.conversa_id);
        await marcarComoLidas(conversaAtiva.conversa_id);
      }
    })
    .subscribe();
}

// ─── HELPERS ─────────────────────────────────────────────
function atualizarTotalUnread() {
  const total = conversas.reduce((s, c) => s + c.nao_lidas, 0);
  const el = document.getElementById('total-unread');
  el.textContent = total;
  el.classList.toggle('show', total > 0);
}

function formatarHora(iso) {
  const d = new Date(iso);
  const hoje = new Date();
  if (d.toDateString() === hoje.toDateString()) {
    return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function voltarLista() {
  document.getElementById('conv-panel').classList.remove('mobile-hidden');
  document.getElementById('chat-panel').classList.remove('mobile-open');
}

function verPerfil() {
  if (!conversaAtiva) return;
  // Redirecionar para o perfil correto com base no tipo
  window.open(`empresa-perfil.html?id=${conversaAtiva.outro_id}`, '_blank');
}

function toast(msg, type = 'success') {
  const bg = type==='success'?'#00E87B':type==='error'?'#FF6B6B':'#4F7CFF';
  const c  = type==='success'?'#030A0E':'#fff';
  const t  = document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${bg};color:${c};padding:14px 28px;border-radius:99px;
    font-family:Outfit,sans-serif;font-weight:700;font-size:14px;z-index:9999;
    box-shadow:0 8px 24px rgba(0,0,0,.3);white-space:nowrap`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}
</script>
</body>
</html>
