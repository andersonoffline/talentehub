<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub — Vaga</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#06090F;--surface:#0D1117;--surface2:#131920;--accent:#00E87B;--blue:#4F7CFF;--coral:#FF6B6B;--amber:#FFB800;--t:#F0F4FF;--t2:#8892A4;--t3:#4A5568;--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(6,9,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:22px;color:var(--t);text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-back{color:var(--t2);text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--t)}

.page{padding:88px 40px 80px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start}

/* MAIN */
.vaga-header{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:20px}
.empresa-row{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.empresa-logo{width:56px;height:56px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;overflow:hidden;flex-shrink:0}
.empresa-logo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.empresa-info h3{font-size:15px;font-weight:700;margin-bottom:2px}
.empresa-info p{font-size:13px;color:var(--t2)}
.vaga-titulo{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:16px}
.vaga-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.tag{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid}
.tag-tipo{background:rgba(79,124,255,.1);color:var(--blue);border-color:rgba(79,124,255,.2)}
.tag-modelo{background:rgba(0,232,123,.08);color:var(--accent);border-color:rgba(0,232,123,.15)}
.tag-nivel{background:rgba(255,184,0,.08);color:var(--amber);border-color:rgba(255,184,0,.15)}
.tag-local{background:var(--surface2);color:var(--t2);border-color:var(--border)}
.vaga-salario{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:8px;font-family:'Outfit',sans-serif}
.vaga-meta{font-size:13px;color:var(--t3)}

.section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.section h2{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section p, .section li{font-size:14px;color:var(--t2);line-height:1.8}
.section ul, .section ol{padding-left:20px}
.section li{margin-bottom:6px}

/* BENEFICIOS */
.beneficios-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.beneficio-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);font-size:13px}

/* SIDEBAR */
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;position:sticky;top:80px}
.preco-box{text-align:center;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.preco-label{font-size:12px;color:var(--t3);margin-bottom:4px}
.preco-valor{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--accent)}
.preco-periodo{font-size:13px;color:var(--t3)}

.btn-candidatar{width:100%;padding:16px;border-radius:12px;background:var(--accent);color:#030A0E;border:none;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:10px}
.btn-candidatar:hover{background:#00ff88;transform:translateY(-1px)}
.btn-candidatar:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-candidatar.aplicado{background:rgba(0,232,123,.1);color:var(--accent);border:1px solid rgba(0,232,123,.3);cursor:default}
.btn-salvar{width:100%;padding:12px;border-radius:12px;background:transparent;color:var(--t2);border:1px solid var(--border);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-salvar:hover{border-color:var(--t3);color:var(--t)}

.sidebar-stats{display:flex;gap:12px;margin:16px 0;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{flex:1;text-align:center}
.stat-value{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--t)}
.stat-label{font-size:11px;color:var(--t3);margin-top:2px}

.empresa-card{background:var(--surface2);border-radius:12px;padding:16px;margin-top:16px}
.empresa-card h4{font-size:14px;font-weight:700;margin-bottom:4px}
.empresa-card p{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.btn-ver-empresa{color:var(--blue);font-size:13px;font-weight:600;text-decoration:none;transition:opacity .2s}
.btn-ver-empresa:hover{opacity:.7}

/* MODAL CANDIDATURA */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:520px}
.modal h3{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--t2);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--t);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;resize:vertical}
.field textarea:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn{padding:10px 24px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#030A0E}
.btn-primary:hover{background:#00ff88}
.btn-secondary{background:var(--surface2);color:var(--t);border:1px solid var(--border)}

/* VAGAS SIMILARES */
.vagas-similares{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.similar-card{padding:14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);text-decoration:none;color:inherit;transition:all .2s;display:block}
.similar-card:hover{border-color:rgba(79,124,255,.3)}
.similar-titulo{font-size:14px;font-weight:700;margin-bottom:2px}
.similar-empresa{font-size:12px;color:var(--t2)}
.similar-salario{font-size:13px;color:var(--accent);font-weight:700;margin-top:6px}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{to{background-position:-200% 0}}

@media(max-width:900px){
  .page{grid-template-columns:1fr}
  nav{padding:0 16px}
  .page{padding:80px 16px 60px}
  .sidebar-card{position:static}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Smart<span>Hub</span></a>
  <a href="vagas-listagem.html" class="nav-back">← Todas as vagas</a>
</nav>

<div class="page">
  <!-- MAIN CONTENT -->
  <div>
    <div id="vaga-main">
      <!-- Skeleton loading -->
      <div class="vaga-header">
        <div style="display:flex;gap:16px;align-items:center;margin-bottom:24px">
          <div class="skel" style="width:56px;height:56px;border-radius:12px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skel" style="height:18px;width:50%;margin-bottom:6px"></div><div class="skel" style="height:14px;width:30%"></div></div>
        </div>
        <div class="skel" style="height:36px;width:70%;margin-bottom:16px"></div>
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <div class="skel" style="height:28px;width:80px;border-radius:99px"></div>
          <div class="skel" style="height:28px;width:90px;border-radius:99px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div>
    <div class="sidebar-card" id="sidebar-main">
      <div class="skel" style="height:40px;margin-bottom:16px"></div>
      <div class="skel" style="height:50px;border-radius:12px;margin-bottom:10px"></div>
      <div class="skel" style="height:44px;border-radius:12px"></div>
    </div>
  </div>
</div>

<!-- MODAL CANDIDATURA -->
<div class="modal-overlay" id="modal-cand">
  <div class="modal">
    <h3>🚀 Candidatar-se</h3>
    <p id="modal-vaga-nome">Enviando candidatura para esta vaga</p>
    <div class="field">
      <label>Carta de apresentação (opcional)</label>
      <textarea id="carta" rows="5" placeholder="Conte por que você é o candidato ideal para esta vaga..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('modal-cand').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCandidatura()">Enviar candidatura ✨</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://xroobxmpmeelklegchhs.supabase.co',
  'sb_publishable_h7ZPYqJFplDqYW9lJ-LURg_kDj5-Zqo'
);

const params = new URLSearchParams(location.search);
const vagaId = params.get('id');
let session = null;
let vaga = null;
let jaCandidatou = false;
let candidatoId = null;

(async () => {
  if (!vagaId) { location.href = 'vagas-listagem.html'; return; }

  const { data: { session: s } } = await sb.auth.getSession();
  session = s;

  await carregarVaga();
  if (session) await verificarCandidatura();
  await carregarSimilares();
})();

async function carregarVaga() {
  const { data, error } = await sb
    .from('vagas')
    .select('*, empresas(nome_fantasia, cidade, logo_url, descricao, site_url, id)')
    .eq('id', vagaId)
    .single();

  if (error || !data) { document.getElementById('vaga-main').innerHTML = '<div style="text-align:center;padding:60px;color:var(--t3)">Vaga não encontrada.</div>'; return; }

  vaga = data;
  renderVaga(data);
  renderSidebar(data);

  // Registrar visualização
  await sb.from('vagas').update({ visualizacoes: (data.visualizacoes || 0) + 1 }).eq('id', vagaId);

  document.title = `SmartHub — ${data.titulo}`;
}

function renderVaga(v) {
  const emp = v.empresas || {};
  const salario = v.salario_min && v.salario_max
    ? `R$ ${v.salario_min.toLocaleString('pt-BR')} – ${v.salario_max.toLocaleString('pt-BR')}/mês`
    : v.salario_min ? `A partir de R$ ${v.salario_min.toLocaleString('pt-BR')}/mês` : 'A combinar';
  const local = v.modalidade === 'remoto' ? '🏠 Remoto'
    : v.modalidade === 'hibrido' ? `🏢 Híbrido · ${emp.cidade || ''}`
    : `📍 Presencial · ${emp.cidade || ''}`;

  document.getElementById('vaga-main').innerHTML = `
    <div class="vaga-header">
      <div class="empresa-row">
        <div class="empresa-logo">
          ${emp.logo_url ? `<img src="${emp.logo_url}" alt="${emp.nome_fantasia}">` : (emp.nome_fantasia||'?').charAt(0)}
        </div>
        <div class="empresa-info">
          <h3>${emp.nome_fantasia || 'Empresa'}</h3>
          <p>${emp.cidade || ''}</p>
        </div>
      </div>
      <div class="vaga-titulo">${v.titulo}</div>
      <div class="vaga-tags">
        ${v.tipo_contrato ? `<span class="tag tag-tipo">${v.tipo_contrato.toUpperCase()}</span>` : ''}
        ${v.modalidade ? `<span class="tag tag-modelo">${v.modalidade}</span>` : ''}
        ${v.nivel ? `<span class="tag tag-nivel">${v.nivel}</span>` : ''}
        <span class="tag tag-local">${local}</span>
        ${v.area ? `<span class="tag tag-local">${v.area}</span>` : ''}
      </div>
      <div class="vaga-salario">${salario}</div>
      <div class="vaga-meta">Publicada ${diasAtras(v.created_at)} · ${v.visualizacoes || 0} visualizações</div>
    </div>

    ${v.descricao ? `
    <div class="section">
      <h2>📋 Sobre a vaga</h2>
      <p style="white-space:pre-line">${v.descricao}</p>
    </div>` : ''}

    ${v.requisitos ? `
    <div class="section">
      <h2>✅ Requisitos</h2>
      <p style="white-space:pre-line">${v.requisitos}</p>
    </div>` : ''}

    ${v.beneficios ? `
    <div class="section">
      <h2>🎁 Benefícios</h2>
      <p style="white-space:pre-line">${v.beneficios}</p>
    </div>` : ''}

    <div class="section">
      <h2>🏢 Sobre a empresa</h2>
      <p>${emp.descricao || 'Informações sobre a empresa não disponíveis.'}</p>
      ${emp.site_url ? `<a href="${emp.site_url}" target="_blank" class="btn-ver-empresa" style="display:inline-block;margin-top:10px">Visitar site →</a>` : ''}
    </div>`;
}

function renderSidebar(v) {
  const salario = v.salario_min && v.salario_max
    ? `R$ ${v.salario_min.toLocaleString('pt-BR')} – ${v.salario_max.toLocaleString('pt-BR')}`
    : v.salario_min ? `R$ ${v.salario_min.toLocaleString('pt-BR')}+` : 'A combinar';
  const emp = v.empresas || {};

  document.getElementById('sidebar-main').innerHTML = `
    <div class="preco-box">
      <div class="preco-label">Faixa salarial</div>
      <div class="preco-valor">${salario}</div>
      <div class="preco-periodo">por mês</div>
    </div>

    <button class="btn-candidatar" id="btn-cand" onclick="abrirCandidatura()">
      🚀 Candidatar-se agora
    </button>
    <button class="btn-salvar" onclick="salvarVaga()">🔖 Salvar vaga</button>

    <div class="sidebar-stats">
      <div class="stat">
        <div class="stat-value" id="stat-cands">—</div>
        <div class="stat-label">candidatos</div>
      </div>
      <div class="stat">
        <div class="stat-value">${v.visualizacoes || 0}</div>
        <div class="stat-label">visualizações</div>
      </div>
      <div class="stat">
        <div class="stat-value">${diasCurto(v.created_at)}</div>
        <div class="stat-label">dias aberta</div>
      </div>
    </div>

    <div class="empresa-card">
      <h4>${emp.nome_fantasia || 'Empresa'}</h4>
      <p>${(emp.descricao || '').substring(0, 120)}${(emp.descricao || '').length > 120 ? '...' : ''}</p>
      <a href="empresa-perfil.html?id=${emp.id}" class="btn-ver-empresa">Ver perfil da empresa →</a>
    </div>

    <div id="similares-section" style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:12px">VAGAS SIMILARES</div>
      <div class="vagas-similares" id="similares-list">
        <div style="font-size:13px;color:var(--t3)">Carregando...</div>
      </div>
    </div>`;

  contarCandidatos();
}

async function contarCandidatos() {
  const { count } = await sb.from('candidaturas').select('id', { count: 'exact', head: true }).eq('vaga_id', vagaId);
  const el = document.getElementById('stat-cands');
  if (el) el.textContent = count || 0;
}

async function verificarCandidatura() {
  const { data: cand } = await sb.from('candidatos').select('id').eq('user_id', session.user.id).maybeSingle();
  if (!cand) return;
  candidatoId = cand.id;

  const { data: aplic } = await sb.from('candidaturas').select('id').eq('vaga_id', vagaId).eq('candidato_id', cand.id).maybeSingle();
  if (aplic) {
    jaCandidatou = true;
    const btn = document.getElementById('btn-cand');
    if (btn) { btn.textContent = '✅ Candidatura enviada'; btn.classList.add('aplicado'); btn.disabled = true; }
  }
}

async function carregarSimilares() {
  if (!vaga) return;
  const { data } = await sb
    .from('vagas')
    .select('id, titulo, salario_min, salario_max, empresas(nome_fantasia)')
    .eq('status', 'ativa')
    .eq('area', vaga.area || '')
    .neq('id', vagaId)
    .limit(3);

  const el = document.getElementById('similares-list');
  if (!el) return;
  if (!data || data.length === 0) { el.innerHTML = '<div style="font-size:13px;color:var(--t3)">Nenhuma similar</div>'; return; }

  el.innerHTML = data.map(v => {
    const sal = v.salario_min ? `R$ ${v.salario_min.toLocaleString('pt-BR')}+` : 'A combinar';
    return `<a class="similar-card" href="vaga-detalhe.html?id=${v.id}">
      <div class="similar-titulo">${v.titulo}</div>
      <div class="similar-empresa">${v.empresas?.nome_fantasia || ''}</div>
      <div class="similar-salario">${sal}</div>
    </a>`;
  }).join('');
}

function abrirCandidatura() {
  if (!session) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
  if (jaCandidatou) return;
  document.getElementById('modal-vaga-nome').textContent = 'Candidatura para: ' + (vaga?.titulo || '');
  document.getElementById('modal-cand').classList.add('open');
}

async function confirmarCandidatura() {
  if (!session || !vaga || !candidatoId) {
    if (!candidatoId) { toast('Complete seu perfil antes de se candidatar', 'error'); return; }
    return;
  }

  const carta = document.getElementById('carta').value;
  const { error } = await sb.from('candidaturas').insert({
    vaga_id: vagaId,
    candidato_id: candidatoId,
    carta_apresentacao: carta,
    status: 'recebido',
  });

  if (error) { toast('Erro: ' + error.message, 'error'); return; }

  document.getElementById('modal-cand').classList.remove('open');
  jaCandidatou = true;
  const btn = document.getElementById('btn-cand');
  if (btn) { btn.textContent = '✅ Candidatura enviada'; btn.classList.add('aplicado'); btn.disabled = true; }
  toast('Candidatura enviada com sucesso! 🎉');
  contarCandidatos();
}

function salvarVaga() { toast('Vaga salva nos favoritos! 🔖', 'info'); }

function diasAtras(iso) {
  const diff = (Date.now() - new Date(iso)) / 864e5;
  if (diff < 1) return 'hoje';
  if (diff < 2) return 'ontem';
  if (diff < 7) return `há ${Math.floor(diff)} dias`;
  return `há ${Math.floor(diff/7)} semanas`;
}

function diasCurto(iso) { return Math.floor((Date.now() - new Date(iso)) / 864e5); }

function toast(msg, type='success') {
  const bg = type==='success'?'#00E87B':type==='error'?'#FF6B6B':'#4F7CFF';
  const c  = type==='success'?'#030A0E':'#fff';
  const t  = document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${bg};color:${c};padding:14px 28px;border-radius:99px;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);white-space:nowrap`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4000);
}

document.getElementById('modal-cand').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-cand')) e.target.classList.remove('open');
});
</script>
</body>
</html>
