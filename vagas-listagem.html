<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub — Vagas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#06090F; --surface:#0D1117; --surface2:#131920;
    --accent:#00E87B; --blue:#4F7CFF; --coral:#FF6B6B; --amber:#FFB800;
    --t:#F0F4FF; --t2:#8892A4; --t3:#4A5568;
    --border:rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--t); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 40px; height:64px;
    background:rgba(6,9,15,.9); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo { font-family:'Outfit',sans-serif; font-weight:800; font-size:22px; color:var(--t); text-decoration:none; }
  .nav-logo span { color:var(--accent); }
  .nav-links { display:flex; gap:32px; list-style:none; }
  .nav-links a { color:var(--t2); text-decoration:none; font-size:14px; font-weight:500; transition:color .2s; }
  .nav-links a:hover,.nav-links a.active { color:var(--t); }
  .nav-cta { display:flex; gap:12px; }
  .btn-nav {
    padding:8px 20px; border-radius:8px; font-size:14px; font-weight:600;
    cursor:pointer; border:none; text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
  }
  .btn-login { background:transparent; color:var(--t2); border:1px solid var(--border); }
  .btn-cadastrar { background:var(--accent); color:#030A0E; }
  .btn-cadastrar:hover { background:#00ff88; }

  /* PAGE */
  .page { padding:88px 40px 80px; max-width:1200px; margin:0 auto; }

  /* SEARCH HERO */
  .search-hero { margin-bottom:40px; }
  .search-hero h1 { font-family:'Outfit',sans-serif; font-size:36px; font-weight:800; letter-spacing:-1px; margin-bottom:8px; }
  .search-hero h1 span { color:var(--accent); }
  .search-hero p { color:var(--t2); font-size:16px; margin-bottom:28px; }
  .search-bar {
    display:flex; gap:12px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:8px 8px 8px 20px;
    align-items:center;
  }
  .search-bar input {
    flex:1; background:none; border:none; outline:none;
    color:var(--t); font-size:15px; font-family:'Plus Jakarta Sans',sans-serif;
  }
  .search-bar input::placeholder { color:var(--t3); }
  .btn-search {
    background:var(--accent); color:#030A0E;
    border:none; border-radius:10px; padding:10px 24px;
    font-family:'Outfit',sans-serif; font-weight:700; font-size:14px;
    cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .btn-search:hover { background:#00ff88; }

  /* LAYOUT */
  .content-layout { display:grid; grid-template-columns:260px 1fr; gap:28px; }

  /* FILTROS */
  .filters-panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px; height:fit-content;
    position:sticky; top:80px;
  }
  .filters-panel h3 {
    font-family:'Outfit',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase; color:var(--t2);
    margin-bottom:20px;
  }
  .filter-group { margin-bottom:24px; }
  .filter-group label {
    display:block; font-size:13px; font-weight:600; color:var(--t2);
    margin-bottom:10px;
  }
  .filter-select, .filter-input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; color:var(--t); font-size:13px;
    font-family:'Plus Jakarta Sans',sans-serif; outline:none; transition:border-color .2s;
  }
  .filter-select:focus, .filter-input:focus { border-color:var(--blue); }
  .filter-select option { background:var(--surface2); }
  .checkbox-group { display:flex; flex-direction:column; gap:8px; }
  .checkbox-item { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .checkbox-item input[type=checkbox] { display:none; }
  .checkbox-box {
    width:18px; height:18px; border:2px solid var(--border); border-radius:5px;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .checkbox-item input:checked + .checkbox-box {
    background:var(--accent); border-color:var(--accent); color:#030A0E;
    font-size:11px; font-weight:900;
  }
  .checkbox-item input:checked + .checkbox-box::after { content:'✓'; }
  .checkbox-label { font-size:13px; color:var(--t2); }
  .range-row { display:flex; gap:8px; }
  .range-row input { width:50%; }
  .btn-limpar {
    width:100%; padding:10px; border-radius:10px; border:1px solid var(--border);
    background:none; color:var(--t2); font-size:13px; font-weight:600;
    cursor:pointer; transition:all .2s; font-family:'Plus Jakarta Sans',sans-serif;
    margin-top:8px;
  }
  .btn-limpar:hover { border-color:var(--t3); color:var(--t); }

  /* RESULTADOS */
  .results-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .results-count {
    font-size:14px; color:var(--t2);
  }
  .results-count span { color:var(--t); font-weight:700; }
  .sort-select {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; color:var(--t2); font-size:13px;
    font-family:'Plus Jakarta Sans',sans-serif; outline:none; cursor:pointer;
  }

  /* CHIPS DE FILTROS ATIVOS */
  .active-filters {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;
  }
  .filter-chip {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(79,124,255,.1); border:1px solid rgba(79,124,255,.25);
    color:var(--blue); padding:4px 12px; border-radius:99px; font-size:12px; font-weight:600;
  }
  .filter-chip button {
    background:none; border:none; color:var(--blue); cursor:pointer; font-size:14px; line-height:1;
  }

  /* CARDS DE VAGA */
  .vagas-grid { display:flex; flex-direction:column; gap:12px; }
  .vaga-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px 28px;
    cursor:pointer; transition:all .2s;
    display:flex; gap:20px; align-items:flex-start;
    text-decoration:none; color:inherit;
  }
  .vaga-card:hover { border-color:rgba(79,124,255,.3); transform:translateY(-1px); }
  .company-logo {
    width:52px; height:52px; border-radius:12px; flex-shrink:0;
    background:linear-gradient(135deg, var(--surface2), #1a2535);
    display:flex; align-items:center; justify-content:center;
    font-family:'Outfit',sans-serif; font-weight:800; font-size:18px; color:var(--t);
    border:1px solid var(--border);
  }
  .vaga-info { flex:1; min-width:0; }
  .vaga-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
  .vaga-titulo { font-family:'Outfit',sans-serif; font-size:17px; font-weight:700; }
  .vaga-empresa { font-size:13px; color:var(--t2); margin-bottom:10px; }
  .vaga-tags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .tag {
    padding:4px 12px; border-radius:99px; font-size:12px; font-weight:600;
    border:1px solid var(--border);
  }
  .tag-tipo { background:rgba(79,124,255,.1); color:var(--blue); border-color:rgba(79,124,255,.2); }
  .tag-modelo { background:rgba(0,232,123,.08); color:var(--accent); border-color:rgba(0,232,123,.15); }
  .tag-nivel { background:rgba(255,184,0,.08); color:var(--amber); border-color:rgba(255,184,0,.15); }
  .tag-local { background:var(--surface2); color:var(--t2); }
  .vaga-footer { display:flex; align-items:center; justify-content:space-between; }
  .vaga-salario { font-size:15px; font-weight:700; color:var(--accent); }
  .vaga-data { font-size:12px; color:var(--t3); }
  .btn-candidatar {
    padding:8px 20px; border-radius:8px; border:none;
    background:var(--blue); color:white;
    font-family:'Outfit',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; transition:all .2s;
  }
  .btn-candidatar:hover { background:#6B92FF; }

  /* NOVO: Badge de relevância IA */
  .ia-score {
    display:inline-flex; align-items:center; gap:4px;
    background:rgba(0,232,123,.08); border:1px solid rgba(0,232,123,.15);
    color:var(--accent); padding:3px 10px; border-radius:99px;
    font-size:11px; font-weight:700;
  }

  /* EMPTY / LOADING */
  .empty-results {
    text-align:center; padding:80px 20px; color:var(--t3);
  }
  .empty-results .icon { font-size:48px; margin-bottom:16px; opacity:.4; }
  .empty-results h3 { font-size:18px; color:var(--t2); margin-bottom:8px; }
  .loading-cards { display:flex; flex-direction:column; gap:12px; }
  .skeleton-card {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:24px 28px; display:flex; gap:20px;
  }
  .skel { background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);
    background-size:200%; animation:shimmer 1.5s infinite; border-radius:8px; }
  @keyframes shimmer { to { background-position:-200% 0; } }

  /* PAGINAÇÃO */
  .pagination {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:32px;
  }
  .page-btn {
    width:36px; height:36px; border-radius:8px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--t2); cursor:pointer; font-size:13px; font-weight:600;
    transition:all .2s; display:flex; align-items:center; justify-content:center;
  }
  .page-btn:hover, .page-btn.active { background:var(--blue); border-color:var(--blue); color:white; }
  .page-btn:disabled { opacity:.3; cursor:not-allowed; }

  @media (max-width:900px) {
    .content-layout { grid-template-columns:1fr; }
    .filters-panel { display:none; }
    nav { padding:0 20px; }
    .nav-links { display:none; }
    .page { padding:80px 20px 60px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Smart<span>Hub</span></a>
  <ul class="nav-links">
    <li><a href="vagas-listagem.html" class="active">Vagas</a></li>
    <li><a href="planos.html">Planos</a></li>
    <li><a href="conteudo-blog.html">Blog</a></li>
  </ul>
  <div class="nav-cta">
    <a href="login.html" class="btn-nav btn-login" id="btn-login">Entrar</a>
    <a href="login.html" class="btn-nav btn-cadastrar" id="btn-cadastrar">Cadastrar</a>
  </div>
</nav>

<div class="page">

  <!-- SEARCH HERO -->
  <div class="search-hero">
    <h1>Encontre sua<br><span>próxima oportunidade</span></h1>
    <p id="subtitulo-vagas">Carregando vagas disponíveis…</p>
    <div class="search-bar">
      <input type="text" id="input-busca" placeholder="Cargo, empresa, habilidade…" onkeydown="if(event.key==='Enter') buscar()">
      <select class="filter-select" id="select-cidade" style="width:160px;border:none;background:var(--surface2);">
        <option value="">📍 Qualquer cidade</option>
      </select>
      <button class="btn-search" onclick="buscar()">Buscar vagas</button>
    </div>
  </div>

  <div class="content-layout">

    <!-- FILTROS -->
    <aside class="filters-panel">
      <h3>Filtros</h3>

      <div class="filter-group">
        <label>Modalidade</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" value="remoto" id="f-remoto" onchange="buscar()">
            <div class="checkbox-box"></div>
            <span class="checkbox-label">🏠 Remoto</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="hibrido" id="f-hibrido" onchange="buscar()">
            <div class="checkbox-box"></div>
            <span class="checkbox-label">🏢 Híbrido</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" value="presencial" id="f-presencial" onchange="buscar()">
            <div class="checkbox-box"></div>
            <span class="checkbox-label">📍 Presencial</span>
          </label>
        </div>
      </div>

      <div class="filter-group">
        <label>Tipo de contrato</label>
        <select class="filter-select" id="f-contrato" onchange="buscar()">
          <option value="">Todos</option>
          <option value="clt">CLT</option>
          <option value="pj">PJ</option>
          <option value="estagio">Estágio</option>
          <option value="freelance">Freelance</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Nível</label>
        <select class="filter-select" id="f-nivel" onchange="buscar()">
          <option value="">Todos</option>
          <option value="junior">Júnior</option>
          <option value="pleno">Pleno</option>
          <option value="senior">Sênior</option>
          <option value="especialista">Especialista</option>
          <option value="lideranca">Liderança</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Área</label>
        <select class="filter-select" id="f-area" onchange="buscar()">
          <option value="">Todas</option>
          <option value="tecnologia">Tecnologia</option>
          <option value="marketing">Marketing</option>
          <option value="vendas">Vendas</option>
          <option value="financeiro">Financeiro</option>
          <option value="rh">RH</option>
          <option value="operacoes">Operações</option>
          <option value="design">Design</option>
          <option value="juridico">Jurídico</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Salário (R$/mês)</label>
        <div class="range-row">
          <input type="number" class="filter-input" id="f-salario-min" placeholder="Mín" onchange="buscar()">
          <input type="number" class="filter-input" id="f-salario-max" placeholder="Máx" onchange="buscar()">
        </div>
      </div>

      <button class="btn-limpar" onclick="limparFiltros()">✕ Limpar filtros</button>
    </aside>

    <!-- RESULTADOS -->
    <div>
      <div class="results-header">
        <div class="results-count" id="results-count">Buscando…</div>
        <select class="sort-select" id="sort-select" onchange="buscar()">
          <option value="recentes">Mais recentes</option>
          <option value="salario_desc">Maior salário</option>
          <option value="salario_asc">Menor salário</option>
        </select>
      </div>

      <div class="active-filters" id="active-filters"></div>

      <div id="vagas-container">
        <!-- Loading skeleton -->
        <div class="loading-cards">
          ${[1,2,3,4].map(() => `
          <div class="skeleton-card">
            <div class="skel" style="width:52px;height:52px;border-radius:12px;flex-shrink:0"></div>
            <div style="flex:1">
              <div class="skel" style="height:20px;width:60%;margin-bottom:8px"></div>
              <div class="skel" style="height:14px;width:35%;margin-bottom:12px"></div>
              <div style="display:flex;gap:8px">
                <div class="skel" style="height:24px;width:70px;border-radius:99px"></div>
                <div class="skel" style="height:24px;width:80px;border-radius:99px"></div>
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>

  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://xroobxmpmeelklegchhs.supabase.co',
  'sb_publishable_h7ZPYqJFplDqYW9lJ-LURg_kDj5-Zqo'
);

const POR_PAGINA = 10;
let paginaAtual = 1;
let totalVagas = 0;

// ─── INIT ────────────────────────────────────────────────
(async () => {
  // Auth navbar
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const bl = document.getElementById('btn-login');
    const bc = document.getElementById('btn-cadastrar');
    bl.textContent = 'Meu painel';
    bl.href = 'candidato-dashboard.html';
    bc.textContent = 'Dashboard';
    bc.href = 'candidato-dashboard.html';
  }

  // Pegar parâmetros da URL se houver
  const params = new URLSearchParams(location.search);
  if (params.get('q')) document.getElementById('input-busca').value = params.get('q');
  if (params.get('cidade')) document.getElementById('select-cidade').value = params.get('cidade');

  await carregarCidades();
  await buscar();
})();

// ─── CIDADES ─────────────────────────────────────────────
async function carregarCidades() {
  const { data } = await sb.from('vagas').select('cidade').eq('status', 'ativa').not('cidade', 'is', null);
  const cidades = [...new Set((data || []).map(v => v.cidade).filter(Boolean))].sort();
  const sel = document.getElementById('select-cidade');
  cidades.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

// ─── BUSCAR VAGAS ─────────────────────────────────────────
async function buscar(pagina = 1) {
  paginaAtual = pagina;
  const container = document.getElementById('vagas-container');
  container.innerHTML = `<div class="loading-cards">${[1,2,3].map(() => `
    <div class="skeleton-card">
      <div class="skel" style="width:52px;height:52px;border-radius:12px;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skel" style="height:20px;width:60%;margin-bottom:8px"></div>
        <div class="skel" style="height:14px;width:35%;margin-bottom:12px"></div>
        <div style="display:flex;gap:8px">
          <div class="skel" style="height:24px;width:70px;border-radius:99px"></div>
          <div class="skel" style="height:24px;width:80px;border-radius:99px"></div>
        </div>
      </div>
    </div>`).join('')}</div>`;

  let query = sb
    .from('vagas')
    .select('*, empresas(nome_fantasia, cidade, logo_url)', { count: 'exact' })
    .eq('status', 'ativa');

  // Filtro de texto
  const texto = document.getElementById('input-busca').value.trim();
  if (texto) {
    query = query.or(`titulo.ilike.%${texto}%,descricao.ilike.%${texto}%,area.ilike.%${texto}%`);
  }

  // Cidade
  const cidade = document.getElementById('select-cidade').value;
  if (cidade) query = query.eq('cidade', cidade);

  // Modalidade (checkboxes)
  const modalidades = ['remoto','hibrido','presencial']
    .filter(m => document.getElementById(`f-${m}`)?.checked);
  if (modalidades.length > 0) query = query.in('modalidade', modalidades);

  // Contrato
  const contrato = document.getElementById('f-contrato').value;
  if (contrato) query = query.eq('tipo_contrato', contrato);

  // Nível
  const nivel = document.getElementById('f-nivel').value;
  if (nivel) query = query.eq('nivel', nivel);

  // Área
  const area = document.getElementById('f-area').value;
  if (area) query = query.eq('area', area);

  // Salário
  const salMin = parseFloat(document.getElementById('f-salario-min').value);
  const salMax = parseFloat(document.getElementById('f-salario-max').value);
  if (!isNaN(salMin)) query = query.gte('salario_max', salMin);
  if (!isNaN(salMax)) query = query.lte('salario_min', salMax);

  // Ordenação
  const sort = document.getElementById('sort-select').value;
  if (sort === 'salario_desc') query = query.order('salario_max', { ascending: false });
  else if (sort === 'salario_asc') query = query.order('salario_min', { ascending: true });
  else query = query.order('created_at', { ascending: false });

  // Paginação
  const from = (pagina - 1) * POR_PAGINA;
  query = query.range(from, from + POR_PAGINA - 1);

  const { data: vagas, count, error } = await query;

  if (error) {
    container.innerHTML = '<div class="empty-results"><div class="icon">⚠️</div><h3>Erro ao carregar</h3><p>Tente novamente.</p></div>';
    return;
  }

  totalVagas = count || 0;
  renderResultados(vagas, count);
  renderPaginacao(pagina, count);
  renderFiltrosAtivos();
  document.getElementById('subtitulo-vagas').textContent =
    `${count} vagas disponíveis agora`;
}

// ─── RENDERIZAR VAGAS ────────────────────────────────────
function renderResultados(vagas, count) {
  document.getElementById('results-count').innerHTML =
    `<span>${count}</span> vagas encontradas`;

  const container = document.getElementById('vagas-container');
  if (!vagas || vagas.length === 0) {
    container.innerHTML = `<div class="empty-results">
      <div class="icon">🔍</div>
      <h3>Nenhuma vaga encontrada</h3>
      <p>Tente ajustar os filtros ou a busca.</p>
    </div>`;
    return;
  }

  container.innerHTML = `<div class="vagas-grid">${vagas.map(v => cartaoVaga(v)).join('')}</div>`;
}

function cartaoVaga(v) {
  const empresa = v.empresas || {};
  const ini = (empresa.nome_fantasia || v.titulo || '?').charAt(0).toUpperCase();
  const salario = v.salario_min && v.salario_max
    ? `R$ ${v.salario_min.toLocaleString('pt-BR')} – ${v.salario_max.toLocaleString('pt-BR')}`
    : v.salario_min ? `A partir de R$ ${v.salario_min.toLocaleString('pt-BR')}` : 'A combinar';
  const data = diasAtras(v.created_at);
  const local = v.modalidade === 'remoto' ? '🏠 Remoto'
    : v.modalidade === 'hibrido' ? `🏢 Híbrido · ${empresa.cidade || v.cidade || ''}`
    : `📍 ${empresa.cidade || v.cidade || 'Presencial'}`;

  return `
    <a class="vaga-card" href="vaga-detalhe.html?id=${v.id}">
      <div class="company-logo">
        ${empresa.logo_url
          ? `<img src="${empresa.logo_url}" alt="${empresa.nome_fantasia}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">`
          : ini}
      </div>
      <div class="vaga-info">
        <div class="vaga-top">
          <div>
            <div class="vaga-titulo">${v.titulo}</div>
            <div class="vaga-empresa">${empresa.nome_fantasia || 'Empresa'}</div>
          </div>
        </div>
        <div class="vaga-tags">
          ${v.tipo_contrato ? `<span class="tag tag-tipo">${v.tipo_contrato.toUpperCase()}</span>` : ''}
          ${v.modalidade ? `<span class="tag tag-modelo">${v.modalidade}</span>` : ''}
          ${v.nivel ? `<span class="tag tag-nivel">${v.nivel}</span>` : ''}
          <span class="tag tag-local">${local}</span>
        </div>
        <div class="vaga-footer">
          <span class="vaga-salario">${salario}</span>
          <span class="vaga-data">${data}</span>
        </div>
      </div>
    </a>`;
}

// ─── PAGINAÇÃO ────────────────────────────────────────────
function renderPaginacao(pagina, total) {
  const totalPags = Math.ceil(total / POR_PAGINA);
  if (totalPags <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="buscar(${pagina-1})" ${pagina===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPags; i++) {
    if (totalPags <= 7 || Math.abs(i - pagina) <= 2 || i === 1 || i === totalPags) {
      html += `<button class="page-btn ${i===pagina?'active':''}" onclick="buscar(${i})">${i}</button>`;
    } else if (Math.abs(i - pagina) === 3) {
      html += `<span style="color:var(--t3);padding:0 4px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="buscar(${pagina+1})" ${pagina===totalPags?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

// ─── CHIPS DE FILTROS ATIVOS ──────────────────────────────
function renderFiltrosAtivos() {
  const chips = [];
  const texto = document.getElementById('input-busca').value.trim();
  if (texto) chips.push({ label: `"${texto}"`, limpar: () => { document.getElementById('input-busca').value=''; buscar(); } });

  const cidade = document.getElementById('select-cidade').value;
  if (cidade) chips.push({ label: `📍 ${cidade}`, limpar: () => { document.getElementById('select-cidade').value=''; buscar(); } });

  const contrato = document.getElementById('f-contrato').value;
  if (contrato) chips.push({ label: contrato.toUpperCase(), limpar: () => { document.getElementById('f-contrato').value=''; buscar(); } });

  const nivel = document.getElementById('f-nivel').value;
  if (nivel) chips.push({ label: nivel, limpar: () => { document.getElementById('f-nivel').value=''; buscar(); } });

  const el = document.getElementById('active-filters');
  if (chips.length === 0) { el.innerHTML=''; return; }
  el.innerHTML = chips.map((c,i) => `
    <span class="filter-chip">${c.label}
      <button onclick="chipLimpar(${i})">×</button>
    </span>`).join('');
  window._chipLimpadores = chips;
}
function chipLimpar(i) { window._chipLimpadores[i].limpar(); }

function limparFiltros() {
  document.getElementById('input-busca').value = '';
  document.getElementById('select-cidade').value = '';
  document.getElementById('f-contrato').value = '';
  document.getElementById('f-nivel').value = '';
  document.getElementById('f-area').value = '';
  document.getElementById('f-salario-min').value = '';
  document.getElementById('f-salario-max').value = '';
  ['remoto','hibrido','presencial'].forEach(m => {
    const el = document.getElementById(`f-${m}`);
    if (el) el.checked = false;
  });
  buscar();
}

// ─── UTILS ────────────────────────────────────────────────
function diasAtras(iso) {
  const diff = (Date.now() - new Date(iso)) / 864e5;
  if (diff < 1) return 'Hoje';
  if (diff < 2) return 'Ontem';
  if (diff < 7) return `${Math.floor(diff)} dias atrás`;
  if (diff < 30) return `${Math.floor(diff/7)} sem. atrás`;
  return `${Math.floor(diff/30)} meses atrás`;
}
