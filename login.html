<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub — Entrar ou Cadastrar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090F;--bg2:#0D1220;--bg3:#141B2D;--surface:#1A2235;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --accent:#00E87B;--accent-d:rgba(0,232,123,.11);
  --blue:#4F7CFF;--blue-d:rgba(79,124,255,.11);
  --coral:#FF6B6B;--t:#F0F4FF;--t2:#8B96B0;--t3:#4A5470;
}
body{background:var(--bg);color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px 60px;position:relative;overflow-y:scroll;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(0,232,123,.06),transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(79,124,255,.06),transparent 50%);pointer-events:none;z-index:0}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:440px;position:relative;z-index:1;margin:auto}

.logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:32px;justify-content:center}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-txt{font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;color:var(--t)}
.logo-txt span{color:var(--accent)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--bg2);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.3)}

h2{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.form-sub{font-size:13.5px;color:var(--t2);margin-bottom:24px}

/* TYPE SELECT */
.type-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.type-opt{border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.type-opt:hover{border-color:var(--border-h)}
.type-opt.selected{border-color:var(--accent);background:var(--accent-d)}
.type-opt.selected-blue{border-color:var(--blue);background:var(--blue-d)}
.type-icon{font-size:22px;margin-bottom:6px}
.type-label{font-size:13px;font-weight:700}
.type-opt.selected .type-label{color:var(--accent)}
.type-opt.selected-blue .type-label{color:var(--blue)}

/* FORM */
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
input:focus,select:focus{border-color:rgba(0,232,123,.35);box-shadow:0 0 0 3px rgba(0,232,123,.07)}
input::placeholder{color:var(--t3)}
select option{background:var(--bg2)}

.btn-submit{width:100%;padding:13px;background:var(--accent);color:#030A0E;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:99px;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-submit:hover{box-shadow:0 8px 24px rgba(0,232,123,.3);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--t3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-google{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border-h);color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;border-radius:99px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--border-h);background:var(--bg3)}

.form-footer{text-align:center;font-size:13px;color:var(--t2);margin-top:20px}
.form-footer a{color:var(--accent);text-decoration:none;font-weight:600}

.error-msg{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);color:var(--coral);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.error-msg.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .4s ease}
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="#030A0E"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="#030A0E" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <span class="logo-txt">Talent<span>Hub</span></span>
  </a>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login',this)">Entrar</button>
    <button class="tab-btn" onclick="switchTab('cadastro',this)">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <h2>Bem-vindo de volta!</h2>
    <p class="form-sub">Entre com sua conta SmartHub</p>
    <div class="error-msg" id="login-error"></div>
    <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com.br"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-senha" placeholder="Sua senha" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
    <button class="btn-submit" onclick="fazerLogin()" id="btn-login">Entrar →</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar com Google
    </button>
    <div class="form-footer">Não tem conta? <a href="#" onclick="switchTab('cadastro',document.querySelectorAll('.tab-btn')[1])">Criar agora</a></div>
  </div>

  <!-- CADASTRO -->
  <div id="form-cadastro" style="display:none">
    <h2>Criar sua conta</h2>
    <p class="form-sub">Escolha como quer usar o SmartHub</p>
    <div class="error-msg" id="cadastro-error"></div>

    <div class="type-select">
      <div class="type-opt selected" id="opt-candidato" onclick="selectType('candidato')">
        <div class="type-icon">👤</div>
        <div class="type-label">Sou candidato</div>
      </div>
      <div class="type-opt" id="opt-empresa" onclick="selectType('empresa')">
        <div class="type-icon">🏢</div>
        <div class="type-label">Sou empresa</div>
      </div>
    </div>

    <div class="field"><label>Nome completo</label><input type="text" id="cad-nome" placeholder="Seu nome completo"></div>
    <div class="field" id="field-empresa-nome" style="display:none"><label>Nome da empresa</label><input type="text" id="cad-empresa" placeholder="Nome da sua empresa"></div>
    <div class="field"><label>E-mail</label><input type="email" id="cad-email" placeholder="seu@email.com.br"></div>
    <div class="field"><label>Senha</label><input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')fazerCadastro()"></div>
    <button class="btn-submit" onclick="fazerCadastro()" id="btn-cadastro">Criar conta grátis →</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar com Google
    </button>
    <div class="form-footer">Já tem conta? <a href="javascript:void(0)" onclick="switchTab('login',document.querySelectorAll('.tab-btn')[0])">Entrar</a></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xroobxmpmeelklegchhs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_h7ZPYqJFplDqYW9lJ-LURg_kDj5-Zqo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userType = 'candidato';

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-cadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
}

function selectType(type) {
  userType = type;
  document.getElementById('opt-candidato').className = 'type-opt' + (type === 'candidato' ? ' selected' : '');
  document.getElementById('opt-empresa').className = 'type-opt' + (type === 'empresa' ? ' selected' : '');
  document.getElementById('field-empresa-nome').style.display = type === 'empresa' ? 'block' : 'none';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  hideError('login-error');

  if(!email || !senha) { showError('login-error', '⚠️ Preencha e-mail e senha'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Entrando...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

  if(error) {
    showError('login-error', '❌ E-mail ou senha incorretos');
    btn.disabled = false; btn.textContent = 'Entrar →';
    return;
  }

  // Check user type and redirect
  const { data: empresa } = await sb.from('empresas').select('id').eq('user_id', data.user.id).maybeSingle();
  if(empresa) {
    window.location.href = 'gestor-dashboard.html';
  } else {
    window.location.href = 'candidato-dashboard.html';
  }
}

async function fazerCadastro() {
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  hideError('cadastro-error');

  if(!nome || !email || !senha) { showError('cadastro-error', '⚠️ Preencha todos os campos'); return; }
  if(senha.length < 6) { showError('cadastro-error', '⚠️ Senha deve ter pelo menos 6 caracteres'); return; }

  const btn = document.getElementById('btn-cadastro');
  btn.disabled = true; btn.textContent = 'Criando conta...';

  const { data, error } = await sb.auth.signUp({ email, password: senha, options: { data: { nome, tipo: userType } } });

  if(error) {
    showError('cadastro-error', '❌ ' + (error.message === 'User already registered' ? 'Este e-mail já está cadastrado' : error.message));
    btn.disabled = false; btn.textContent = 'Criar conta grátis →';
    return;
  }

  if(data.user) {
    if(userType === 'empresa') {
      const nomeEmpresa = document.getElementById('cad-empresa').value.trim() || nome;
      await sb.from('empresas').insert({ user_id: data.user.id, nome_fantasia: nomeEmpresa });
      window.location.href = 'empresa-cadastro.html';
    } else {
      await sb.from('candidatos').insert({ user_id: data.user.id, nome, email });
      window.location.href = 'candidato-perfil.html';
    }
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/candidato-dashboard.html' }
  });
}

// Verifica se já está logado
sb.auth.getSession().then(({ data }) => {
  if(data.session) window.location.href = 'candidato-dashboard.html';
});
</script>
</body>
</html>
